version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: loomiflow-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-loomiflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-loomiflow_secret}
      POSTGRES_DB: ${POSTGRES_DB:-loomiflow}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - loomiflow_network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-loomiflow} -d ${POSTGRES_DB:-loomiflow}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: loomiflow-redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secret}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - loomiflow_network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: loomiflow-backend
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER:-loomiflow}:${POSTGRES_PASSWORD:-loomiflow_secret}@postgres:5432/${POSTGRES_DB:-loomiflow}?schema=public
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379
    ports:
      - "8000:8000"
      - "5001:5001"
    networks:
      - loomiflow_network

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: loomiflow-frontend
    restart: always
    depends_on:
      - backend
    env_file:
      - ./frontend/.env.local
      - ./frontend/.env
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    networks:
      - loomiflow_network

networks:
  loomiflow_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
