services:
  - type: redis
    name: loomiflow-redis
    region: oregon
    plan: starter
    ipAllowList: [] # empty means all allowing access only from other services in the same render account

  - type: web
    name: loomiflow-backend
    env: docker
    region: oregon
    plan: starter
    dockerCommand: "pnpm run start:prod"
    branch: main
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: loomiflow-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: loomiflow-redis
          property: connectionString
      - key: PORT
        value: "8000"
      - key: NODE_ENV
        value: "production"

databases:
  - name: loomiflow-db
    region: oregon
    plan: starter
    databaseName: loomiflow
    user: loomiflow
